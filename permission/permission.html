<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trish — Enable microphone</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      font-size: 18px;
      max-width: 560px;
      margin: 60px auto;
      padding: 0 16px;
      color: #111827;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #f9fafb; }
    }
    button {
      font: inherit;
      font-weight: 600;
      padding: 14px 28px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-height: 48px;
    }
    button:focus-visible { outline: 3px solid #4f46e5; outline-offset: 2px; }
    #status { margin-top: 20px; font-weight: 600; }
    #status.ok { color: #16a34a; }
    #status.err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Enable the microphone for Trish</h1>
  <p>
    Chrome needs you to allow microphone access once from this page.
    Click the button below, then choose <strong>Allow</strong> in the
    browser prompt (it appears near the address bar).
  </p>
  <button id="enable">Enable microphone</button>
  <p id="status" role="status" aria-live="assertive"></p>
  <script src="permission.js"></script>
</body>
</html>
