<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Registration Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }
        .form-container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        fieldset {
            border: 1px solid #dcdde1;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }
        legend {
            font-weight: bold;
            color: #2980b9;
            padding: 0 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group.inline {
            display: flex;
            gap: 20px;
        }
        .form-group.inline > div {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9em;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="url"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #2980b9;
            outline: none;
            box-shadow: 0 0 5px rgba(41, 128, 185, 0.3);
        }
        .radio-checkbox-group {
            display: flex;
            gap: 15px;
            margin-top: 5px;
        }
        .radio-checkbox-group label {
            display: inline-flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }
        .radio-checkbox-group input {
            margin-right: 6px;
        }
        textarea {
            resize: vertical;
        }
        .button-group {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button[type="submit"] {
            background-color: #2ecc71;
            color: white;
            font-weight: bold;
            margin-right: 10px;
        }
        button[type="submit"]:hover {
            background-color: #27ae60;
        }
        button[type="reset"] {
            background-color: #e74c3c;
            color: white;
        }
        button[type="reset"]:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Create Your Account</h2>
    <p class="subtitle">Please fill out this extensive form to join our platform.</p>

    <!-- The form sends data to a server handler using POST for security -->
    <form action="/submit-form-endpoint" method="POST" enctype="multipart/form-data">
        
        <!-- SECTION 1: Personal Credentials -->
        <fieldset>
            <legend>Account Info</legend>
            
            <div class="form-group inline">
                <div>
                    <label for="first-name">First Name *</label>
                    <input type="text" id="first-name" name="firstName" placeholder="John" required>
                </div>
                <div>
                    <label for="last-name">Last Name *</label>
                    <input type="text" id="last-name" name="lastName" placeholder="Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email-address">Email Address *</label>
                <input type="email" id="email-address" name="email" placeholder="john.doe@example.com" required>
            </div>

            <div class="form-group inline">
                <div>
                    <label for="user-password">Password *</label>
                    <input type="password" id="user-password" name="password" placeholder="Min. 8 characters" required>
                </div>
                <div>
                    <label for="birth-date">Date of Birth</label>
                    <input type="date" id="birth-date" name="birthDate">
                </div>
            </div>
        </fieldset>

        <!-- SECTION 2: Advanced Contact Details -->
        <fieldset>
            <legend>Contact & Web Details</legend>

            <div class="form-group inline">
                <div>
                    <label for="phone-number">Phone Number</label>
                    <input type="tel" id="phone-number" name="phone" placeholder="+1 (555) 000-0000">
                </div>
                <div>
                    <label for="website-url">Personal Website</label>
                    <input type="url" id="website-url" name="website" placeholder="https://yourwebsite.com">
                </div>
            </div>

            <div class="form-group">
                <label for="experience-years">Years of Professional Experience</label>
                <input type="number" id="experience-years" name="experienceYears" min="0" max="50" value="0">
            </div>
        </fieldset>

        <!-- SECTION 3: Choices & Selections -->
        <fieldset>
            <legend>Preferences & Selections</legend>

            <!-- Radio Buttons (Choose ONLY one item) -->
            <div class="form-group">
                <label>Preferred Communication Method</label>
                <div class="radio-checkbox-group">
                    <label>
                        <input type="radio" name="commMethod" value="email" checked> Email
                    </label>
                    <label>
                        <input type="radio" name="commMethod" value="phone"> Phone
                    </label>
                    <label>
                        <input type="radio" name="commMethod" value="sms"> SMS
                    </label>
                </div>
            </div>

            <!-- Checkboxes (Choose MULTIPLE items) -->
            <div class="form-group">
                <label>Areas of Interest (Select all that apply)</label>
                <div class="radio-checkbox-group">
                    <label>
                        <input type="checkbox" name="interests" value="design"> Web Design
                    </label>
                    <label>
                        <input type="checkbox" name="interests" value="development"> Development
                    </label>
                    <label>
                        <input type="checkbox" name="interests" value="marketing"> Marketing
                    </label>
                </div>
            </div>

            <!-- Standard Dropdown Menu -->
            <div class="form-group">
                <label for="user-country">Country of Residence</label>
                <select id="user-country" name="country">
                    <option value="" disabled selected>-- Select Your Country --</option>
                    <option value="US">United States</option>
                    <option value="CA">Canada</option>
                    <option value="UK">United Kingdom</option>
                    <option value="IN">India</option>
                    <option value="AU">Australia</option>
                </select>
            </div>
        </fieldset>

        <!-- SECTION 4: File Upload & Custom Notes -->
        <fieldset>
            <legend>Additional Information</legend>

            <!-- File Upload Input Element -->
            <div class="form-group">
                <label for="user-resume">Upload Your Resume (PDF/Word)</label>
                <input type="file" id="user-resume" name="resume" accept=".pdf,.doc,.docx">
            </div>

            <!-- Multi-line Text Area -->
            <div class="form-group">
                <label for="cover-letter">Cover Letter / Short Bio</label>
                <textarea id="cover-letter" name="coverLetter" rows="5" placeholder="Tell us a little bit about yourself..."></textarea>
            </div>

            <!-- Individual Terms Agreement Checkbox -->
            <div class="form-group">
                <div class="radio-checkbox-group">
                    <label>
                        <input type="checkbox" name="termsAgree" required> I agree to the privacy policy and terms of service *
                    </label>
                </div>
            </div>
        </fieldset>

        <!-- Submit and Reset Buttons -->
        <div class="button-group">
            <button type="submit">Submit Form</button>
            <button type="reset">Clear Form</button>
        </div>

    </form>
</div>

</body>
</html>
